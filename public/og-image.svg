<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0c0c0c"/>
  
  <!-- Outer Border -->
  <rect x="40" y="40" width="1120" height="550" stroke="#222" stroke-width="4"/>
  
  <!-- Section Dividers -->
  <path d="M40 160H1160" stroke="#222" stroke-width="2"/>
  <path d="M600 160V590" stroke="#222" stroke-width="2"/>
  
  <!-- Header Section -->
  <text x="80" y="105" fill="#666" font-family="monospace" font-size="16" font-weight="700" letter-spacing="0.2em">MARKET_REPORT // MAURITIUS_FUEL_INDEX</text>
  <text x="80" y="140" fill="#e5e5e5" font-family="sans-serif" font-size="32" font-weight="800" letter-spacing="-0.02em">CHRONOLOGICAL PRICE REGISTRY [2002-2026]</text>
  
  <!-- Left Side: Petrol -->
  <rect x="80" y="200" width="20" height="20" fill="#4ade80"/>
  <text x="115" y="216" fill="#e5e5e5" font-family="sans-serif" font-size="18" font-weight="700" letter-spacing="0.05em">MOGAS (PETROL) / RON 95</text>
  <text x="80" y="320" fill="#4ade80" font-family="monospace" font-size="110" font-weight="800">58.45</text>
  <text x="80" y="360" fill="#666" font-family="monospace" font-size="18" font-weight="700">MUR PER LITRE</text>
  
  <!-- Left Side: Detail -->
  <text x="80" y="480" fill="#e5e5e5" font-family="sans-serif" font-size="16" font-weight="500" line-height="1.5">
    <tspan x="80" dy="0">Historical peak analysis and correlation</tspan>
    <tspan x="80" dy="25">with international Brent benchmarks.</tspan>
  </text>

  <!-- Right Side: Diesel -->
  <rect x="640" y="200" width="20" height="20" fill="#facc15"/>
