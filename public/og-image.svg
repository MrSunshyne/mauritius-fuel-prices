  <text x="1120" y="615" fill="#444" font-family="monospace" font-size="12" font-weight="700" text-anchor="end">DATA SOURCE: STATE TRADING CORPORATION (STC) // PLATFORM BY SANDEEP RAMGOLAM</text>
