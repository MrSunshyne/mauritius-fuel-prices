  <!-- Top/Bottom standardized color indicators -->
  <rect x="0" y="0" width="1200" height="12" fill="#4ade80"/>
  <rect x="0" y="618" width="1200" height="12" fill="#facc15"/>
  
  <!-- Centered Title Block -->
  <!-- Line 1: MAURITIUS -->
  <text x="600" y="270" fill="#ffffff" font-family="sans-serif" font-size="120" font-weight="900" letter-spacing="-0.04em" text-anchor="middle">MAURITIUS</text>
  
  <!-- Line 2: FUEL PRICES -->
  <text x="600" y="390" fill="#ffffff" font-family="sans-serif" font-size="120" font-weight="900" letter-spacing="-0.04em" text-anchor="middle">FUEL PRICES</text>
  
